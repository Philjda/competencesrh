<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assistant RAG — CompetencesRH</title>
    <style>
      /* Variables de couleurs */
      :root {
        --anthracite: #1a1a1a;
        --anthracite-light: #252525;
        --grey-light: #e0e0e0;
        --grey-muted: #888888;
        --border: #333333;
      }

      body {
        font-family: 'Inter', Arial, sans-serif;
        background-color: var(--anthracite);
        color: var(--grey-light);
        margin: 0;
        display: flex;
        justify-content: center;
        padding: 40px 20px;
      }

      .container {
        width: 100%;
        max-width: 800px;
      }

      h1 {
        font-weight: 300;
        font-size: 1.5rem;
        letter-spacing: 1px;
        margin-bottom: 30px;
        color: #fff;
      }

      /* Sélecteur de document */
      .selector-section {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }

      select {
        flex: 1;
        background: var(--anthracite-light);
        color: var(--grey-light);
        border: 1px solid var(--border);
        padding: 10px;
        border-radius: 4px;
        outline: none;
      }

      /* Fenêtre de Chat */
      #chat-window {
        background: var(--anthracite-light);
        border: 1px solid var(--border);
        height: 50vh;
        border-radius: 4px;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .msg {
        max-width: 85%;
        padding: 12px;
        border-radius: 4px;
        font-size: 0.95rem;
        line-height: 1.4;
      }

      .user-msg {
        align-self: flex-end;
        background: var(--grey-light);
        color: var(--anthracite);
      }

      .bot-msg {
        align-self: flex-start;
        border: 1px solid var(--border);
        color: var(--grey-light);
      }

      /* Zone de saisie */
      .input-section {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }

      input[type="text"] {
        flex: 1;
        background: transparent;
        border: 1px solid var(--border);
        color: var(--grey-light);
        padding: 12px;
        border-radius: 4px;
        outline: none;
      }

      button {
        background: var(--grey-light);
        color: var(--anthracite);
        border: none;
        padding: 0 25px;
        border-radius: 4px;
        font-weight: bold;
        cursor: pointer;
        transition: opacity 0.2s;
      }

      button:hover {
        opacity: 0.8;
      }

      button:disabled {
        background: var(--border);
        color: var(--grey-muted);
        cursor: not-allowed;
      }

      .status-text {
        font-size: 0.8rem;
        color: var(--grey-muted);
        margin-top: 8px;
        text-align: center;
      }
    </style>
  </head>
  <body>

    <div class="container">
      <h1>Assistant Documentaire RH</h1>

      <div class="selector-section">
        <select id="docSelect">
          {% for file in files %}
            <option value="{{ file }}">{{ file }}</option>
          {% endfor %}
        </select>
        <button id="loadBtn" onclick="loadDocument()">Charger</button>
      </div>

      <div id="chat-window">
        <div class="msg bot-msg">Système prêt. Sélectionnez un document pour commencer.</div>
      </div>

      <div class="input-section">
        <input type="text" id="userInput" placeholder="Poser une question..." disabled />
        <button id="sendBtn" onclick="askQuestion()" disabled>Envoyer</button>
      </div>
      <div id="loader" class="status-text"></div>
    </div>

    <script>
      const chatWin = document.getElementById('chat-window');
      const userInput = document.getElementById('userInput');
      const loader = document.getElementById('loader');

      function addMessage(text, isUser) {
        const div = document.createElement('div');
        div.className = isUser ? 'msg user-msg' : 'msg bot-msg';
        div.textContent = text;
        chatWin.appendChild(div);
        chatWin.scrollTop = chatWin.scrollHeight;
      }

      async function loadDocument() {
        const file = document.getElementById('docSelect').value;
        loader.textContent = "Analyse du document...";
        
        try {
          const res = await fetch('/select_doc', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ filename: file })
          });
          const data = await res.json();
          addMessage("Document chargé : " + file, false);
          userInput.disabled = false;
          document.getElementById('sendBtn').disabled = false;
        } catch (e) {
          addMessage("Erreur de chargement.", false);
        } finally {
          loader.textContent = "";
        }
      }

      async function askQuestion() {
        const text = userInput.value.trim();
        if(!text) return;

        addMessage(text, true);
        userInput.value = "";
        loader.textContent = "Recherche dans le document...";

        try {
          const res = await fetch('/ask', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ question: text })
          });
          const data = await res.json();
          addMessage(data.answer, false);
        } catch (e) {
          addMessage("Erreur réseau.", false);
        } finally {
          loader.textContent = "";
        }
      }

      userInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") askQuestion();
      });
    </script>

  </body>
</html>
