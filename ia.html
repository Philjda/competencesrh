<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot IA RH - compétencesrh.fr</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #000;
        color: #fff;
        margin: 0;
        padding: 20px;
      }
      h1 {
        color: #ccc;
      }
      #chat {
        max-width: 800px;
        margin: 20px auto;
        border: 1px solid #444;
        border-radius: 8px;
        padding: 15px;
        height: 60vh;
        overflow-y: auto;
      }
      .message {
        margin-bottom: 10px;
        padding: 8px 12px;
        border-radius: 6px;
        max-width: 80%;
        word-wrap: break-word;
      }
      .user {
        background: #333;
        margin-left: auto;
        text-align: right;
      }
      .bot {
        background: #222;
        margin-right: auto;
      }
      #input-container {
        max-width: 800px;
        margin: 10px auto;
        display: flex;
        gap: 8px;
      }
      #message {
        flex: 1;
        padding: 10px;
        border-radius: 4px;
        border: 1px solid #444;
        background: #111;
        color: #fff;
      }
      button {
        padding: 10px 16px;
        border-radius: 4px;
        border: 1px solid #444;
        background: #222;
        color: #fff;
        cursor: pointer;
      }
      button:hover {
        background: #333;
      }
    </style>
  </head>
  <body>
    <h1>Chatbot IA RH — compétencesrh.fr</h1>
    <p>Poser une question sur le management RH, les compétences ou la data RH.</p>

    <div id="chat"></div>

    <div id="input-container">
      <input type="text" id="message" placeholder="Question RH…" />
      <button onclick="sendMessage()">Envoyer</button>
    </div>

    <script>
      const chat = document.getElementById("chat");
      const input = document.getElementById("message");

      function addMessage(text, isUser) {
        const div = document.createElement("div");
        div.classList.add("message");
        div.classList.add(isUser ? "user" : "bot");
        div.textContent = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
      }

      // Remplace par l’URL de ton backend Render
      const API_URL = "const API_URL = "https://chatbotia-0qcm.onrender.com/chat";

      async function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, true);
        input.value = "";

        try {
          const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text }),
          });

          const data = await res.json();
          addMessage(data.response || "Erreur.", false);
        } catch (err) {
          addConditionMessage("Erreur de connexion au serveur.", false);
        }
      }

      input.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
      });
    </script>
  </body>
</html>
