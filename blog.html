<script>
fetch('https://blog-api-a3v9.onrender.com/api/articles')
  .then(r => r.json())
  .then(articles => {
    document.getElementById('blog').innerHTML = articles.map(a => `
      <article class="blog-article">
        <h2 class="article-title">${a.title}</h2>
        <p class="article-meta">// ${a.date} · ${a.readingTime} min de lecture</p>
        <p class="article-text">${a.excerpt}</p>
        <a href="/blog/${a.slug}.html" class="btn-primary">Lire →</a>
      </article>
    `).join('');
  })
  .catch(() => {
    document.getElementById('blog').innerHTML = `
      <article class="blog-article">
        <h2 class="article-title">Réguler la charge de travail</h2>
        <p class="article-meta">// 2026-04-15 · 5 min de lecture</p>
        <p class="article-text">IA, surcharge cognitive, télétravail, forfait jours...</p>
        <a href="/blog/reguler-charge-travail-transformation-rh.html class="btn-primary">Lire →</a>
      </article>
      <article class="blog-article">
        <h2 class="article-title">Absentéisme 2026 : chiffres et enjeux RH</h2>
        <p class="article-meta">// 2026-04-13 · 3 min de lecture</p>
        <p class="article-text">Absentéisme record à 4,8% en 2025, soit 18 milliards d'euros.</p>
        <a href="/blog/absenteeisme-2026-chiffres-enjeux-rh.html" class="btn-primary">Lire →</a>
      </article>
    `;
  });
</script>
